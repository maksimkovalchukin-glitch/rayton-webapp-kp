<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Налаштування — Rayton KP</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/telegram.css" />
  <script src="js/settings.js" defer></script>
</head>

<body>
<div class="app">

  <!-- ── ЕКРАН ПАРОЛЯ ─────────────────────────────── -->

  <div id="passwordScreen">

    <div class="page-header">
      <span class="page-icon">🔒</span>
      <h1 class="page-title">Адмін-панель</h1>
    </div>

    <div class="card form-card">
      <div class="field">
        <label for="passwordInput">Пароль</label>
        <input id="passwordInput" type="password" placeholder="Введіть пароль" autocomplete="off" />
      </div>
      <div id="passwordError" style="color:#e53935;font-size:13px;padding:4px 0;display:none">
        Невірний пароль
      </div>
    </div>

    <button class="primary-btn" id="loginBtn">Увійти</button>

  </div>

  <!-- ── АДМІН-ПАНЕЛЬ ─────────────────────────────── -->

  <div id="adminPanel" style="display:none">

    <div class="page-header">
      <span class="page-icon">⚙️</span>
      <h1 class="page-title">Менеджери</h1>
    </div>

    <!-- Список менеджерів -->
    <div id="managerList"></div>

    <!-- Форма додавання -->
    <div class="card form-card" style="margin-top:10px">

      <div class="divider">Додати / редагувати менеджера</div>

      <div class="field">
        <label for="addName">Ім'я</label>
        <input id="addName" type="text" placeholder="Петров Дмитро" />
      </div>

      <div class="field">
        <label for="addPhone">Телефон</label>
        <input id="addPhone" type="tel" placeholder="+380501234567" />
      </div>

      <div class="field">
        <label for="addEmail">Email</label>
        <input id="addEmail" type="email" placeholder="petrov@rayton.com" />
      </div>

      <div class="field">
        <label for="addTelegram">Telegram нік (без @)</label>
        <input id="addTelegram" type="text" placeholder="petrov_dm" autocomplete="off" />
      </div>

      <div id="addError" style="color:#e53935;font-size:13px;padding:4px 0;display:none">
        Заповніть ім'я та Telegram нік
      </div>

      <button class="primary-btn" id="addBtn" style="margin-top:4px">Додати</button>

    </div>

    <!-- Зберегти -->
    <button class="primary-btn" id="saveBtn" style="margin-top:12px">💾 Зберегти зміни</button>
    <div id="saveStatus" style="text-align:center;padding:10px;font-size:14px"></div>

    <!-- Підказка -->
    <div class="hint-box" style="margin-top:4px">
      Зміни зберігаються в n8n (Google Sheet) і стають активними для всіх пристроїв одразу.
    </div>

  </div>

</div>
</body>
</html>
