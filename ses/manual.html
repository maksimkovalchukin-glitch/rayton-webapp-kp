<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>СЕС — Напівручний режим</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="../css/telegram.css" />
  <script src="../js/auth.js" defer></script>

  <script src="../js/app.js" defer></script>
  <script src="../js/catalog.js" defer></script>
  <script src="../js/calculate-engine.js" defer></script>
  <script src="../js/ses/manual.js" defer></script>
</head>

<body>

<div class="app">

  <div class="page-header">
    <span class="page-icon">✍️</span>
    <h1 class="page-title">СЕС · Напівручний режим</h1>
  </div>

  <div class="card form-card">

    <!-- ================= ОСНОВНІ ДАНІ ================= -->

    <div class="field">
      <label>Назва проєкту</label>
      <input id="project_name" type="text" placeholder="ТОВ ЕНЕРГОБУД" />
    </div>

    <div class="field">
      <label>Менеджер</label>
      <select id="manager">
        <option value="">Оберіть менеджера</option>
      </select>
    </div>

    <div class="field">
      <label>Регіон</label>
      <select id="region">
        <option value="">Оберіть регіон</option>
        <option>Вінницька область</option>
        <option>Волинська область</option>
        <option>Дніпропетровська область</option>
        <option>Донецька область</option>
        <option>Житомирська область</option>
        <option>Закарпатська область</option>
        <option>Запорізька область</option>
        <option>Івано-Франківська область</option>
        <option>Київська область</option>
        <option>м. Київ</option>
        <option>Кіровоградська область</option>
        <option>Львівська область</option>
        <option>Миколаївська область</option>
        <option>Одеська область</option>
        <option>Полтавська область</option>
        <option>Рівненська область</option>
        <option>Сумська область</option>
        <option>Тернопільська область</option>
        <option>Харківська область</option>
        <option>Херсонська область</option>
        <option>Хмельницька область</option>
        <option>Черкаська область</option>
        <option>Чернівецька область</option>
        <option>Чернігівська область</option>
      </select>
    </div>

    <!-- ================= ФІНАНСИ ================= -->

    <div class="divider">Фінанси</div>

      <!-- Валюта -->
    <div class="field">
      <label for="currency">Валюта</label>
      <select id="currency">
        <option>USD</option>
        <option>EUR</option>
      </select>
    </div>

    <div class="field">
      <label>Вартість</label>
      <select id="price_vat_type">
        <option selected>з ПДВ</option>
      </select>
    </div>

    <div class="field">
      <label>Вартість СЕС за 1 кВт</label>
      <input id="price_per_kw" type="number" min="0" step="0.01" placeholder="Наприклад: 350" />
    </div>

    <!-- ================= ФОТОМОДУЛІ ================= -->

    <div class="divider">Фотомодулі</div>

    <div class="field">
      <label>Тип панелей</label>
      <select id="module_type">
        <option value="">Оберіть панель</option>
        <option value="Фотоелектричні модулі Тrina 575W" data-watt="575">Тrina 575W</option>
        <option value="Фотоелектричні модулі Тrina 580W" data-watt="580">Тrina 580W</option>
        <option value="Фотоелектричні модулі Тrina 610W" data-watt="610">Тrina 610W</option>
        <option value="Фотоелектричні модулі Тrina 710W" data-watt="710">Тrina 710W</option>
        <option value="Фотоелектричні модулі JA 625W" data-watt="625">JA 625W</option>
        <option value="Фотоелектричні модулі Longi 580W" data-watt="580">Longi 580W</option>
        <option value="Фотоелектричні модулі Longi 610W" data-watt="610">Longi 610W</option>
        <option value="Фотоелектричні модулі Trina 625W" data-watt="625">Trina 625W</option>
        <option value="Фотоелектричні модулі Trina 620W" data-watt="620" selected>Trina 620W</option>
      </select>
    </div>

    <div class="field">
      <label>Кількість панелей</label>
      <input id="panel_qty" type="number" min="0" placeholder="Наприклад: 400" />
    </div>

    <!-- ================= РОЗРАХУНОК ================= -->

    <div class="divider">Розрахунок</div>

    <div class="field">
      <label>Потужність панелей (DC), кВт</label>
      <input id="real_dc" type="number" readonly />
    </div>

    <div class="field">
      <label>Рекомендована AC потужність (кВт)</label>
      <input id="recommended_ac" type="number" readonly />
    </div>

    <div class="hint-box" id="recommendationBox">
      Введіть дані для розрахунку
    </div>

    <!-- ================= ІНВЕРТОРИ ================= -->

    <div class="divider">Інвертори (до 3 типів)</div>

    <div class="field inverter-row">
      <select id="inverter_1_model">
        <option value="">Інвертор 1</option>
        <option value="150">Huawei SUN2000-150KTL-G0</option>
        <option value="115">Huawei SUN2000-115KTL-M2</option>
        <option value="100">Huawei SUN2000-100KTL-M2</option>
        <option value="50">Huawei SUN2000-50KTL-M3</option>
        <option value="30">Huawei SUN2000-30KTL-M3</option>
      </select>
      <input id="inverter_1_qty" type="number" min="0" placeholder="К-сть" />
    </div>

    <div class="field inverter-row">
      <select id="inverter_2_model">
        <option value="">Інвертор 1</option>
        <option value="150">Huawei SUN2000-150KTL-G0</option>
        <option value="115">Huawei SUN2000-115KTL-M2</option>
        <option value="100">Huawei SUN2000-100KTL-M2</option>
        <option value="50">Huawei SUN2000-50KTL-M3</option>
        <option value="30">Huawei SUN2000-30KTL-M3</option>
      <input id="inverter_2_qty" type="number" min="0" placeholder="К-сть" />
    </div>

    <div class="field inverter-row">
      <select id="inverter_3_model">
        <option value="">Інвертор 1</option>
        <option value="150">Huawei SUN2000-150KTL-G0</option>
        <option value="115">Huawei SUN2000-115KTL-M2</option>
        <option value="100">Huawei SUN2000-100KTL-M2</option>
        <option value="50">Huawei SUN2000-50KTL-M3</option>
        <option value="30">Huawei SUN2000-30KTL-M3</option>
      <input id="inverter_3_qty" type="number" min="0" placeholder="К-сть" />
    </div>

    <div class="field">
      <label>Фактична AC потужність (кВт)</label>
      <input id="real_ac" type="number" readonly />
    </div>

    <!-- ================= ДОДАТКОВО ================= -->

    <div class="divider">Додатково</div>

    <div class="field">
      <label>Тип матеріалів</label>
      <select id="material_type">
        <option>DC та AC</option>
        <option>DC</option>
      </select>
    </div>

    <div class="field">
      <label>Тип СЕС</label>
      <select id="ses_type">
        <option selected>Дахова</option>
        <option>Наземна</option>
      </select>
    </div>

    <div class="field">
      <label>Система регулювання потужності</label>
      <select id="power_regulation">
        <option>Лічильник + Трансформатори струму (3шт)</option>
      </select>
    </div>

    <div class="field">
      <label>Пристрій моніторингу</label>
      <select id="monitoring_device">
        <option selected>Huawei Smart Dongle</option>
      </select>
    </div>

    <div class="field">
      <label>Тип кріплення</label>
      <select id="mount_type">
        <option>блочки</option>
        <option>сітка</option>
        <option>баластна сітка</option>
        <option>баластна сітка з противагою</option>
        <option>гвинт-шуруп</option>
        <option>схід-захід</option>
        <option>схід-захід (без баласту) деш.</option>
        <option>схід-захід (без баласту) дор.</option>
        <option>з підйомом</option>
        <option>з підйомом без баласту</option>
        <option>наземка</option>
        <option>наземка схід-захід</option>
      </select>
    </div>

  </div>

  <button class="primary-btn" id="submitBtn" disabled>
    Підготувати КП
  </button>

</div>

</body>
</html>
